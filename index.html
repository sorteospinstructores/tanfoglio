<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sorteo Sp Instructores : Tanfoglio Combat</title>

<style>
:root{
  --bg:#050709;
  --panel:#0c1216;
  --text:#e6f0f2;
  --muted:#8fa3a8;

  --green:#00ff84;
  --amber:#ffb84d;
  --red:#ff3b3b;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto;
  background:
    radial-gradient(900px 500px at 20% 0%, rgba(0,255,132,.08), transparent 60%),
    radial-gradient(800px 400px at 100% 20%, rgba(255,59,59,.05), transparent 60%),
    var(--bg);
  color:var(--text);
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* ================= HEADER ================= */

.header{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  background:var(--panel);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:20px;
}

.headerText{
  flex:1 1 500px;
}

h1{
  margin:0;
  font-size:28px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.subtitle{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
}

/* ====== IMÁGENES DEBAJO DEL TÍTULO ====== */

.heroImages{
  margin-top:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.heroImages img{
  width:100%;
  max-width:420px;
  border-radius:12px;
  background:#111;
}

.heroImages .logo{
  height:70px;
  object-fit:contain;
  padding:8px;
}

.heroImages .gun{
  height:240px;
  object-fit:cover;
  object-position:center;
}

/* ================= TIMER ================= */

.timerBox{
  margin-top:20px;
  background:#000;
  border-radius:14px;
  padding:15px;
  border:1px solid rgba(0,255,132,.25);
}

.timer{
  font-family:monospace;
  font-size:42px;
  color:var(--green);
  text-align:center;
  letter-spacing:2px;
}

.bar{
  margin-top:12px;
  height:10px;
  background:#111;
  border-radius:999px;
  overflow:hidden;
}

.bar i{
  display:block;
  height:100%;
  width:100%;
  background:linear-gradient(90deg,var(--green),#00ff84);
  transition:width .3s;
}

/* ================= GRID ================= */

.panel{
  margin-top:25px;
  background:var(--panel);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(255,255,255,.08);
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(4,1fr)}
}

.cell{
  padding:14px;
  background:#111;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.1);
  cursor:pointer;
  text-align:center;
  font-weight:800;
  letter-spacing:1px;
}

.cell.ok{border-color:rgba(0,255,132,.3)}
.cell.warn{border-color:rgba(255,184,77,.3)}
.cell.bad{
  border-color:rgba(255,59,59,.4);
  background:rgba(255,0,0,.1);
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.show{display:flex}

.modalBox{
  background:#0d1316;
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:500px;
}

input,select{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  background:#000;
  color:white;
}

button{
  margin-top:12px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  font-weight:800;
  cursor:pointer;
}

.save{background:var(--green)}
.danger{background:var(--red)}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">

    <div class="headerText">
      <h1>Sorteo Sp Instructores : Tanfoglio Combat</h1>

      <!-- IMÁGENES EN RAÍZ: PRIMERO LOGO, DESPUÉS PISTOLA -->
      <div class="heroImages">
        <img src="2150201.png" class="logo" alt="Logo">
        <img src="IMG_6670 (2).png" class="gun" alt="Tanfoglio Combat">
      </div>

      <div class="subtitle">
        Grilla 00–99 • modo demo • estética táctica militar.
      </div>

      <div class="timerBox">
        <div class="timer" id="timer">99:99</div>
        <div class="bar"><i id="bar"></i></div>
      </div>
    </div>

  </div>

  <div class="panel">
    <div class="grid" id="grid"></div>
  </div>

</div>

<div class="modal" id="modal">
  <div class="modalBox">
    <h3 id="modalTitle"></h3>
    <input id="name" placeholder="Nombre">
    <input id="phone" placeholder="Teléfono">
    <select id="status">
      <option value="ok">Disponible</option>
      <option value="warn">Reservado</option>
      <option value="bad">Vendido</option>
    </select>
    <button class="save" onclick="save()">Guardar</button>
    <button class="danger" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>
const grid = document.getElementById("grid")
const timer = document.getElementById("timer")
const bar = document.getElementById("bar")
const modal = document.getElementById("modal")
const modalTitle = document.getElementById("modalTitle")

let state = []
let selected = null

for(let i=0;i<100;i++){
  state.push({number:String(i).padStart(2,"0"),status:"ok",name:"",phone:""})
}

function render(){
  grid.innerHTML=""
  let available = state.filter(n=>n.status==="ok").length

  state.forEach(n=>{
    const div=document.createElement("div")
    div.className="cell "+n.status
    div.textContent=n.number
    div.onclick=()=>openModal(n.number)
    grid.appendChild(div)
  })

  const units = Math.floor(available/100*9999)
  const mm = String(Math.floor(units/100)).padStart(2,"0")
  const ss = String(units%100).padStart(2,"0")
  timer.textContent=mm+":"+ss
  bar.style.width=(available)+"%"

  if(available===0){
    timer.style.color="var(--red)"
  }else{
    timer.style.color="var(--green)"
  }
}

function openModal(num){
  selected=state.find(n=>n.number===num)
  modalTitle.textContent="Número "+num
  document.getElementById("name").value=selected.name
  document.getElementById("phone").value=selected.phone
  document.getElementById("status").value=selected.status
  modal.classList.add("show")
}

function closeModal(){
  modal.classList.remove("show")
}

function save(){
  selected.name=document.getElementById("name").value
  selected.phone=document.getElementById("phone").value
  selected.status=document.getElementById("status").value
  closeModal()
  render()
}

render()
</script>

</body>
</html>
